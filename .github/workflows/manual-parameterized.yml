name: workflow_dispatch
on:
  workflow_dispatch:
    inputs:
      application_name:
        description: 'application name'
        required: true
        type: string
      run_validation:
        description: 'validation'
        required: true
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      # This mapping only works if the step below has a matching 'id'
      validation_status: ${{ steps.set-status.outputs.validation_status }}
    steps:
      - run: |
          echo "----Runtime variables---"
          echo "${{ inputs.application_name }}"
          echo "${{ inputs.run_validation }}"

      # FIXED: Added the mandatory 'id' so the job-level output can find it
      - id: set-status
        run: |
          # FIXED: Swapped parentheses ( ) for standard Bash brackets [ ]
          if [ "${{ inputs.run_validation }}" = "true" ]; then
             # FIXED: Swapped '==' for a single '=' to properly assign the output variable
             echo "validation_status=success" >> $GITHUB_OUTPUT
          else
             echo "validation_status=skipped" >> $GITHUB_OUTPUT
          fi

  summary:
    runs-on: ubuntu-latest
    needs: validate
    # This now evaluates perfectly because the 'validate' job finishes with a green checkmark
    if: ${{ needs.validate.outputs.validation_status == 'success' }}
    steps:
      - run: echo "completed"
